services:
  bot:
    build: .
    container_name: autoreply-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./userbot.session:/app/userbot.session
      - ./bot.log:/app/bot.log
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: autoreply-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
